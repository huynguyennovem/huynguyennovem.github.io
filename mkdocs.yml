site_url: https://huynq.dev
site_name: Huy Nguyen Blog
site_description: Huy Nguyen is an open-source engineer focused on Flutter, accessibility, Material Design, and community knowledge sharing.
site_author: Huy Nguyen
nav:
  - Home: index.md
  - Experiences: experiences.md
  - Posts: posts.md
  - Talks: talks.md
  - About: about.md
  - Community Activities: community_activities.md
  - Projects and packages: projects_packages.md
  - Contributions: contributions.md
theme:
  name: readthedocs
  custom_dir: overrides
extra_css:
  - stylesheets/home-feedback.css
  - stylesheets/heading-links.css
extra_javascript:
  - javascripts/home-feedback.js
  - javascripts/heading-links.js
extra:
  social_image: https://huynq.dev/img/huy-social.jpg?v=20260401-1
  social_image_type: image/jpeg
  social_image_width: "1200"
  social_image_height: "627"
  analytics:
    provider: google
    property: G-RJT4VPTE10
    feedback:
      title: Was my blog helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This blog was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This blog could be improved
          data: 0
          note: >- 
            Thanks for your feedback! Help us improve this blog by
            using our <a href="https://github.com/huynguyennovem/huynguyennovem.github.io/issues" target="_blank" rel="noopener">feedback form</a>.
