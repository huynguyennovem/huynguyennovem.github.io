{% extends "base.html" %}

{% block extrahead %}
{{ super() }}
{% if page and page.is_homepage %}
<meta property="og:type" content="website" />
<meta property="og:title" content="{{ config.site_name }}" />
<meta property="og:site_name" content="{{ config.site_name }}" />
<meta property="og:description" content="{{ config.site_description }}" />
<meta property="og:url" content="{{ config.site_url }}" />
<meta property="og:image" content="{{ config.extra.social_image }}" />
<meta property="og:image:secure_url" content="{{ config.extra.social_image }}" />
<meta property="og:image:type" content="{{ config.extra.social_image_type }}" />
<meta property="og:image:width" content="{{ config.extra.social_image_width }}" />
<meta property="og:image:height" content="{{ config.extra.social_image_height }}" />
<meta property="og:image:alt" content="Portrait of Huy Nguyen" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{ config.site_name }}" />
<meta name="twitter:description" content="{{ config.site_description }}" />
<meta name="twitter:image" content="{{ config.extra.social_image }}" />
<meta name="twitter:image:alt" content="Portrait of Huy Nguyen" />
{% endif %}
<script async src="https://www.googletagmanager.com/gtag/js?id=G-RJT4VPTE10"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-RJT4VPTE10');
</script>
{% endblock %}
